name: Update projects page

on:
  schedule:
    - cron: "37 6 * * *" # daily at 06:37 UTC
  workflow_dispatch: {}
  # fired by maxgfr/maxgfr when the canonical projects.json changes
  repository_dispatch:
    types: [projects-config-updated]
  push:
    branches: [main]
    # NB: the projects DATA lives in maxgfr/maxgfr/.github/projects.json (single
    # source of truth). Editing it there does not trigger this workflow — the
    # site refreshes on the daily schedule, or run this workflow manually.
    paths:
      - ".github/scripts/generate-projects.mjs"
      - ".github/workflows/update-projects.yml"

permissions:
  contents: write
  actions: write # to trigger the "Deploy to GitHub Pages" workflow after a change

concurrency:
  group: update-projects
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate projects pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-projects.mjs

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet -- content/projects.md content/projects.en.md; then
            echo "Projects pages already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/projects.md content/projects.en.md
          git commit -m "chore: auto-update projects page"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # The commit above is pushed with GITHUB_TOKEN, which by design does NOT
      # trigger the push-based "Deploy to GitHub Pages" workflow. Kick it
      # explicitly (workflow_dispatch is exempt from that anti-recursion rule)
      # so the rebuilt pages actually go live.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
